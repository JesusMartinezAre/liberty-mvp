<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>POPA FIFA Headers — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0c;
      --surface:    #111114;
      --card:       #16161a;
      --border:     rgba(255,255,255,0.07);
      --red:        #F40009;
      --red-dim:    rgba(244,0,9,0.10);
      --text:       #f0f0f2;
      --text-sub:   rgba(240,240,242,0.55);
      --text-muted: rgba(240,240,242,0.32);
      --sans:       'Bricolage Grotesque', system-ui, sans-serif;
      --mono:       'Geist Mono', monospace;
      --radius:     16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ── PAGE LAYOUT ── */
    .auth-root {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 48px;
      gap: 28px;
    }

    /* ── BRAND ── */
    .brand { text-align: center; }
    .brand-eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 8px;
    }
    .brand-title {
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.05;
    }
    .brand-sub {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 7px;
      font-family: var(--mono);
    }

    /* ── CARD ── */
    .card-wrap {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 44px 36px 40px;
      animation: panelIn .22s ease;
    }

    /* ── FORM ── */
    .field-group { display: flex; flex-direction: column; gap: 14px; }
    .field       { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-sub);
      font-family: var(--mono);
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: rgba(244,0,9,0.45);
      box-shadow: 0 0 0 3px rgba(244,0,9,0.08);
    }
    input::placeholder { color: var(--text-muted); }

    /* ── PRIMARY BUTTON ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s, transform .1s;
      margin-top: 4px;
    }
    .btn-primary:hover    { opacity: .88; }
    .btn-primary:active   { transform: scale(.98); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── SSO BUTTON ── */
    .btn-sso {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .btn-sso:hover    { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); }
    .btn-sso:active   { transform: scale(.98); }
    .btn-sso:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── GHOST BUTTON ── */
    .btn-ghost {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--text-sub);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.14); }

    /* ── BACK LINK ── */
    .back-link {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      align-self: flex-start;
      letter-spacing: .3px;
    }
    .back-link:hover { color: var(--text-sub); }

    /* ── SPINNER ── */
    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-sso.loading .spinner,
    .btn-primary.loading .spinner { display: block; }

    /* ── ERROR ── */
    .err-msg {
      font-size: 11.5px;
      color: #ff6b6b;
      font-family: var(--mono);
      line-height: 1.45;
      min-height: 16px;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 10px;
      font-family: var(--mono);
      letter-spacing: .5px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── FOOTER ── */
    .footer-note {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      text-align: center;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="auth-root">

  <!-- Branding -->
  <div class="brand">
    <div class="brand-eyebrow">Coca-Cola Liberty · FIFA World Cup 2026</div>
    <div class="brand-title">FIFA Headers</div>
    <div class="brand-sub">Digital Display Inventory Platform</div>
  </div>

  <!-- Login card -->
  <div class="card-wrap">

    <!-- Panel 1: Primary SSO options -->
    <div id="panel-main" class="panel">
      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-.3px">Sign In</div>
        <div style="font-size:11px;color:var(--text-muted);font-family:var(--mono);margin-top:5px;line-height:1.5">
          Sign in with your organization account.
        </div>
      </div>

      <div class="err-msg" id="main-err" role="alert"></div>

      <button id="btn-microsoft" class="btn-sso">
        <span class="spinner"></span>
        <svg width="18" height="18" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1"  y="1"  width="9" height="9" fill="#F25022"/>
          <rect x="11" y="1"  width="9" height="9" fill="#7FBA00"/>
          <rect x="1"  y="11" width="9" height="9" fill="#00A4EF"/>
          <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
        </svg>
        Continue with Microsoft
      </button>

      <div class="divider">or</div>

      <button id="btn-show-password" class="btn-ghost">Sign in with password</button>
    </div>

    <!-- Panel 2: Password form -->
    <div id="panel-password" class="panel hidden">
      <button id="btn-back" class="back-link">← Back</button>

      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-.3px">Password Sign In</div>
        <div style="font-size:11px;color:var(--text-muted);font-family:var(--mono);margin-top:5px;line-height:1.5">
          Enter your credentials to continue.
        </div>
      </div>

      <form id="form-password" class="field-group" novalidate>
        <div class="field">
          <label for="pw-email">Email</label>
          <input type="email" id="pw-email"
                 placeholder="you@popatelier.net"
                 autocomplete="email"
                 inputmode="email">
        </div>
        <div class="field">
          <label for="pw-password">Password</label>
          <input type="password" id="pw-password"
                 placeholder="••••••••"
                 autocomplete="current-password">
        </div>

        <div class="err-msg" id="password-err" role="alert"></div>

        <button type="submit" class="btn-primary" id="btn-pw-submit">
          <span class="spinner"></span>
          Sign In
        </button>
      </form>
    </div>

  </div>

  <div class="footer-note">POP Atelier LLC · popatelier.net · Restricted access</div>

</div>

<!-- <script src="https://global.oktacdn.com/okta-auth-js/7.8.1/okta-auth-js.min.js"></script> -->
<!-- <script src="/js/oktaConfig.js"></script> -->
<script>
  // ── Elements ────────────────────────────────────────────────────────────────
  const panelMain     = document.getElementById('panel-main');
  const panelPassword = document.getElementById('panel-password');
  const btnMicrosoft  = document.getElementById('btn-microsoft');
  const btnShowPw     = document.getElementById('btn-show-password');
  const btnBack       = document.getElementById('btn-back');
  const mainErr       = document.getElementById('main-err');
  const formPassword  = document.getElementById('form-password');
  const passwordErr   = document.getElementById('password-err');

  // ── Error param — shown when SAML callback redirects back with ?error= ────
  const urlError = new URLSearchParams(window.location.search).get('error');
  if (urlError) {
    const errorMessages = {
      saml_failed:         'Sign-in failed. Please try again.',
      saml_invalid:        'SAML response could not be verified.',
      saml_no_email:       'Your identity provider did not share an email address.',
      account_inactive:    'Your account has been deactivated. Contact your administrator.',
      saml_not_configured: 'SAML SSO is not yet configured on this server.',
      no_token:            'Sign-in session was lost. Please try again.',
      storage_denied:      'Browser storage is blocked. Enable cookies and try again.',
    };
    mainErr.textContent = errorMessages[urlError] || 'An error occurred during sign-in.';
    history.replaceState(null, '', window.location.pathname);
  }

  // ── Microsoft SSO ─────────────────────────────────────────────────────────
  btnMicrosoft.addEventListener('click', async () => {
    mainErr.textContent = '';
    btnMicrosoft.disabled = true;
    btnMicrosoft.classList.add('loading');
    try {
      const res = await fetch('/api/auth/saml/initiate');
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `Server error ${res.status}`);
      }
      const { redirectUrl } = await res.json();
      window.location.href = redirectUrl;
    } catch (err) {
      mainErr.textContent = err.message || 'Could not initiate sign-in. Please try again.';
      btnMicrosoft.disabled = false;
      btnMicrosoft.classList.remove('loading');
    }
  });

  // ── Panel toggle ──────────────────────────────────────────────────────────
  btnShowPw.addEventListener('click', () => {
    panelMain.classList.add('hidden');
    panelPassword.classList.remove('hidden');
  });

  btnBack.addEventListener('click', () => {
    panelPassword.classList.add('hidden');
    panelMain.classList.remove('hidden');
    passwordErr.textContent = '';
  });

  // ── Password form ─────────────────────────────────────────────────────────
  formPassword.addEventListener('submit', async (e) => {
    e.preventDefault();
    passwordErr.textContent = '';

    const email    = document.getElementById('pw-email').value.trim();
    const password = document.getElementById('pw-password').value;

    if (!email || !password) {
      passwordErr.textContent = 'Please enter your email and password.';
      return;
    }

    const submitBtn = document.getElementById('btn-pw-submit');
    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    try {
      const res  = await fetch('/api/auth/password-login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(data.error || `Server error ${res.status}`);
      }

      localStorage.setItem('app-session', data.token);
      window.location.replace('/index.html');

    } catch (err) {
      passwordErr.textContent = err.message || 'Sign-in failed. Please try again.';
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
